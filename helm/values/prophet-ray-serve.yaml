ray:
  version: "2.53.0"
  image: "rayproject/ray:2.53.0-py311"
  head:
    cpu: "2"
    memory: "4Gi"
  worker:
    replicas: 2
    cpu: "4"
    memory: "8Gi"
    gpus: 0

serve:
  # Replace with output of `serve build` for your real app.
  serveConfigV2: |
    applications:
      - name: default
        route_prefix: /
        import_path: "app:deployment_graph"
        runtime_env:
          # Prefer baking deps into the image for production reliability; this is a demo default.
          working_dir: "https://github.com/ray-project/test_dag/archive/refs/heads/master.zip"
        deployments:
          - name: Model
            num_replicas: 1
            ray_actor_options:
              num_cpus: 1
