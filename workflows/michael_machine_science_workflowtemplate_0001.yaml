apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: michael-machine-science-0001
spec:
  entrypoint: michael-machine-science
  templates:
    - name: michael-machine-science
      dag:
        tasks:
          - name: belief-update
            template: pack-step
            arguments:
              parameters:
                - name: pack_ref
                  value: packs/psl-pack/pack.yaml
          - name: belief-promotion-gate
            dependencies: [belief-update]
            template: pack-step
            arguments:
              parameters:
                - name: pack_ref
                  value: packs/belief-to-ontology-gate/pack.yaml
          - name: candidate-law-discovery
            dependencies: [belief-update]
            template: pack-step
            arguments:
              parameters:
                - name: pack_ref
                  value: packs/pysr-pack/pack.yaml
          - name: candidate-law-promotion-gate
            dependencies: [candidate-law-discovery]
            template: pack-step
            arguments:
              parameters:
                - name: pack_ref
                  value: packs/candidate-law-gate/pack.yaml
          - name: human-twin-boundary-gate
            dependencies: [belief-update]
            template: pack-step
            arguments:
              parameters:
                - name: pack_ref
                  value: packs/human-twin-boundary-gate/pack.yaml
    - name: pack-step
      inputs:
        parameters:
          - name: pack_ref
      container:
        image: alpine:3.20
        command: [sh, -lc]
        args:
          - |
            echo "stub workflow template consuming ${pack_ref}";
            echo "Replace this template with the actual controller/executor once the pack runtime is selected.";
