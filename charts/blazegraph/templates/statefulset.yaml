apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "blazegraph.fullname" . }}
spec:
  serviceName: {{ include "blazegraph.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "blazegraph.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "blazegraph.fullname" . }}
    spec:
      containers:
        - name: blazegraph
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            # Many Blazegraph images expose config via env; keep empty for now.
            - name: JAVA_OPTS
              value: "-Xms2g -Xmx2g"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
{{ toYaml .Values.resources | indent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
{{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
{{- end }}
