apiVersion: apps/v1
kind: Deployment
metadata:
  name: { include "prophet-lake-writer.fullname" . }
  labels:
    app.kubernetes.io/name: prophet-lake-writer
    app.kubernetes.io/part-of: prophet-platform
    socioprofit.com/atom: prophet-lake-writer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: prophet-lake-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prophet-lake-writer
        app.kubernetes.io/part-of: prophet-platform
        socioprofit.com/atom: prophet-lake-writer
    spec:
      containers:
        - name: prophet-lake-writer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: { include "prophet-lake-writer.fullname" . }-config
          env:
            {- range $k, $v := .Values.env }
            - name: {{ $k }}
              value: {{ $v | quote }}
            {- end }
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 20 }}
