apiVersion: v1
kind: Service
metadata:
  name: { include "prophet-ingest-gateway.fullname" . }
  labels:
    app.kubernetes.io/name: prophet-ingest-gateway
    app.kubernetes.io/part-of: prophet-platform
    socioprofit.com/atom: prophet-ingest-gateway
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: prophet-ingest-gateway
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
