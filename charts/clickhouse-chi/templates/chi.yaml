apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: {{ .Values.cluster.name | quote }}
spec:
  templates:
    podTemplates:
      - name: clickhouse-pod-template
        spec:
          containers:
            - name: clickhouse
              image: {{ .Values.cluster.image | quote }}
              ports:
                - name: http
                  containerPort: {{ .Values.service.httpPort }}
                - name: native
                  containerPort: {{ .Values.service.nativePort }}
              resources:
{{ toYaml .Values.resources | indent 16 }}
              volumeMounts:
                - name: clickhouse-storage
                  mountPath: /var/lib/clickhouse
    volumeClaimTemplates:
      - name: clickhouse-storage
        reclaimPolicy: Retain
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ .Values.storage.size | quote }}
          storageClassName: {{ .Values.storage.storageClassName | quote }}
  configuration:
    clusters:
      - name: {{ .Values.cluster.name | quote }}
        layout:
          shardsCount: {{ .Values.cluster.shardsCount }}
          replicasCount: {{ .Values.cluster.replicasCount }}
        templates:
          podTemplate: clickhouse-pod-template
