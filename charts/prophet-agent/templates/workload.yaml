apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: { include "prophet-agent.fullname" . }
  labels:
    app.kubernetes.io/name: prophet-agent
    app.kubernetes.io/part-of: prophet-platform
    socioprofit.com/atom: prophet-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: prophet-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prophet-agent
        app.kubernetes.io/part-of: prophet-platform
        socioprofit.com/atom: prophet-agent
    spec:
      containers:
        - name: prophet-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: { include "prophet-agent.fullname" . }-config
          env:
            {- range $k, $v := .Values.env }
            - name: {{ $k }}
              value: {{ $v | quote }}
            {- end }
          resources:
{{ toYaml .Values.resources | indent 20 }}
